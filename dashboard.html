<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MobileShop Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed lg:static z-50 top-0 left-0 w-64 h-full bg-[#071225] text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col justify-between">

            <div>
                <!-- Logo -->
                <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-700">
                    <i class="fa-solid fa-mobile-screen-button text-pink-500 text-xl"></i>
                    <h1 class="text-2xl font-bold">MobileShop</h1>
                </div>

                <!-- Menu -->
                <div class="px-5 py-6">
                    <p class="text-gray-400 uppercase text-sm mb-5">Management</p>

                    <nav class="space-y-3">

                        <a href="#"
                            class="flex items-center px-4 py-3 rounded-xl bg-gradient-to-r from-pink-500 to-purple-600 font-semibold">
                            Dashboard
                        </a>

                        <a href="#" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 transition">
                            Products
                        </a>

                        <a href="#" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 transition">
                            Orders
                        </a>

                        <a href="#" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-800 transition">
                            Users
                        </a>

                    </nav>
                </div>
            </div>

            <!-- Logout -->
            <div class="p-5">
                <button class="w-full bg-gray-800 hover:bg-gray-700 transition py-3 rounded-xl font-semibold">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Overlay -->
        <div id="overlay" class="fixed inset-0 bg-black/50 hidden z-40 lg:hidden"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-y-auto">

            <!-- Header -->
            <header class="bg-white shadow-sm px-4 lg:px-8 py-4 flex items-center justify-between">

                <div class="flex items-center gap-4">

                    <!-- Mobile Menu Button -->
                    <button id="menuBtn" class="lg:hidden text-2xl text-gray-700">
                        <i class="fa-solid fa-bars"></i>
                    </button>

                    <h2 class="text-2xl font-bold text-gray-800">
                        Dashboard
                    </h2>

                </div>

            </header>

            <!-- Dashboard Content -->
            <main class="p-4 lg:p-8">

                <!-- Cards -->
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-xl bg-green-100 flex items-center justify-center">
                                <i class="fa-solid fa-dollar-sign text-green-600 text-xl"></i>
                            </div>

                            <div>
                                <p class="text-gray-500">Total Sales</p>
                                <h3 class="text-3xl font-bold">$0.00</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-xl bg-blue-100 flex items-center justify-center">
                                <i class="fa-solid fa-cart-shopping text-blue-600 text-xl"></i>
                            </div>

                            <div>
                                <p class="text-gray-500">Total Orders</p>
                                <h3 class="text-3xl font-bold">0</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-xl bg-purple-100 flex items-center justify-center">
                                <i class="fa-solid fa-users text-purple-600 text-xl"></i>
                            </div>

                            <div>
                                <p class="text-gray-500">Customers</p>
                                <h3 class="text-3xl font-bold">1</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Card -->
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-xl bg-red-100 flex items-center justify-center">
                                <i class="fa-solid fa-triangle-exclamation text-red-600 text-xl"></i>
                            </div>

                            <div>
                                <p class="text-gray-500">Low Stock Items</p>
                                <h3 class="text-3xl font-bold">0</h3>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Recent Orders -->
                <div class="bg-white rounded-2xl shadow-sm mt-8 overflow-hidden">

                    <!-- Table Header -->
                    <div class="flex items-center justify-between p-6 border-b">
                        <h3 class="text-xl font-semibold text-gray-800">
                            Recent Orders
                        </h3>

                        <a href="#" class="text-pink-600 hover:text-pink-700 font-medium">
                            View all »
                        </a>
                    </div>

                    <!-- Responsive Table -->
                    <div class="overflow-x-auto">

                        <table class="w-full min-w-[700px]">

                            <thead class="bg-gray-50 text-gray-500 uppercase text-sm">
                                <tr>
                                    <th class="text-left px-6 py-4">Order ID</th>
                                    <th class="text-left px-6 py-4">Customer</th>
                                    <th class="text-left px-6 py-4">Date</th>
                                    <th class="text-left px-6 py-4">Total</th>
                                    <th class="text-left px-6 py-4">Status</th>
                                </tr>
                            </thead>

                            <tbody>
                                <!-- Empty Row -->
                                <tr>
                                    <td colspan="5" class="text-center py-10 text-gray-400">
                                        No recent orders
                                    </td>
                                </tr>
                            </tbody>

                        </table>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <!-- Sidebar Script -->
    <script>

        const sidebar = document.getElementById("sidebar");
        const menuBtn = document.getElementById("menuBtn");
        const overlay = document.getElementById("overlay");

        menuBtn.addEventListener("click", () => {
            sidebar.classList.remove("-translate-x-full");
            overlay.classList.remove("hidden");
        });

        overlay.addEventListener("click", () => {
            sidebar.classList.add("-translate-x-full");
            overlay.classList.add("hidden");
        });

    </script>

</body>

</html>
