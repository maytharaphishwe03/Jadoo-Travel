<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="bg-gradient-to-r from-blue-100 via-indigo-50 to-blue-200 min-h-screen flex items-center justify-center p-4">

    <section
        class="mt-3 max-w-[500px] bg-white rounded-[2rem] shadow-xl px-8 py-10 sm:px-12 sm:py-12 flex flex-col items-center ">

        <div class="mb-5">
            <div>
                <img src="./images/add-user.png" alt="sign up"
                    class="w-16 border-2 border-gray-200 shadow-md rounded-xl bg-indigo-200 p-3">
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">
                Create Account
            </h1>
            <p class="text-slate-400 text-sm mt-1.5 font-medium">
                Join us today! It only takes a minute.
            </p>
        </div>

        <form action="" class="w-full flex flex-col gap-5">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label for="name" class="font-extrabold text-lg text-slate-700  tracking-wide">
                        Full Name
                    </label>
                    <input type="text" id="name" placeholder="John Doe"
                        class="w-full border border-slate-100 bg-slate-50/60 rounded-xl px-4 py-3.5 text-sm text-slate-700 placeholder-slate-300 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="email" class="font-extrabold text-lg text-slate-700 tracking-wide">
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="name@company.com"
                        class="w-full border border-slate-100 bg-slate-50/60 rounded-xl px-4 py-3.5 text-sm text-slate-700 placeholder-slate-300 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="password" class="font-extrabold text-lg text-slate-700 tracking-wide">
                    Password
                </label>
                <input type="password" id="password" placeholder="••••••••"
                    class="w-full border border-slate-100 bg-slate-50/60 rounded-xl px-4 py-3.5 text-sm text-slate-700 placeholder-slate-300 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="confirm-password" class="font-extrabold text-lg text-slate-700 tracking-wide">
                    Confirm Password
                </label>
                <input type="password" id="confirm-password" placeholder="••••••••"
                    class="w-full border border-slate-100 bg-slate-50/60 rounded-xl px-4 py-3.5 text-sm text-slate-700 placeholder-slate-300 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
            </div>

            <div class="flex items-start gap-2.5 my-1 text-xs">
                <input type="checkbox" id="terms"
                    class="w-4 h-4 mt-0.5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                <label for="terms" class="text-slate-500 leading-normal font-medium">
                    I agree to the <a href="#" class="text-indigo-600 underline hover:text-indigo-700">Terms of
                        Service</a> and <a href="#" class="text-indigo-600 underline hover:text-indigo-700">Privacy
                        Policy</a>.
                </label>
            </div>

            <button type="submit"
                class="bg-[#4f46e5] hover:bg-[#4338ca] transition duration-300 text-white font-bold text-sm rounded-xl py-4 shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-1">
                Create My Account
                <span class="tracking-tighter font-normal text-xs opacity-90">&gt;&gt;</span>
            </button>

        </form>

        <div class="mt-8 text-xs font-semibold text-slate-400 tracking-wide">
            Already have an account?
            <a href="login.html" class="text-indigo-600 font-extrabold hover:underline ml-0.5">
                Sign in here
            </a>
        </div>

    </section>

</body>

</html>
